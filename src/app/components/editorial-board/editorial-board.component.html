<div class="container-fluid mt-3">
  <div class="row mb-3 header-sub sticky">
    <div class="col-md-3 align-self-center">
      <h1 class="breadcrumb-chevron">هيئة التحرير</h1>
    </div>
  </div>

  <div class="container-fluid mb-5" *ngIf="studiesintolerances">
    <div class="row">
      <div
        class="col-sm-6 col-lg-3 my-auto mb-2"
        *ngFor="let studiesintolerance of studiesintolerances"
      >
        <a
          routerLink="/editorialboard/{{ studiesintolerance.name }}"
          class="cursor"
        >
          <div class="box shadow-sm p-4">
            <div class="image-wrapper mb-3">
              <img
                class="img-fluid"
                src="{{ studiesintolerance.image }}"
                alt="..."
              />
            </div>
            <div class="box-desc">
              <h5>{{ studiesintolerance.author_arabic }}</h5>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <div class="row" *ngIf="studiesintolerances.length === 0">
    No Data Available
  </div>
</div>
