<div class="audio-player-container">
  <div class="audio-player">
    <div class="player-header">
      <div class="album-art">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </div>
      <div class="track-info">
        <h3 class="track-title">{{ trackTitle }}</h3>
        <p class="track-artist">{{ trackArtist }}</p>
      </div>
    </div>

    <audio
      #audioElement
      [src]="audioUrl"
      (timeupdate)="onTimeUpdate()"
      (loadedmetadata)="onLoadedMetadata()"
      (play)="onPlay()"
      (pause)="onPause()"
    ></audio>

    <div class="progress-container">
      <div class="time-display">{{ formatTime(currentTime) }}</div>
      <div class="progress-bar" (click)="seek($event)">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
        <div class="progress-handle" [style.left.%]="progressPercent"></div>
      </div>
      <div class="time-display">{{ formatTime(duration) }}</div>
    </div>

    <div class="controls">
      <button class="control-btn" (click)="rewind()" title="Rewind 10s">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
          />
          <text
            x="12"
            y="15"
            text-anchor="middle"
            font-size="8"
            fill="currentColor"
            font-weight="bold"
          >
            10
          </text>
        </svg>
      </button>

      <button
        class="control-btn play-btn"
        (click)="togglePlay()"
        [title]="isPlaying ? 'Pause' : 'Play'"
      >
        <svg *ngIf="!isPlaying" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg *ngIf="isPlaying" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 4h4v16H6zm8 0h4v16h-4z" />
        </svg>
      </button>

      <button class="control-btn" (click)="forward()" title="Forward 10s">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"
          />
          <text
            x="12"
            y="15"
            text-anchor="middle"
            font-size="8"
            fill="currentColor"
            font-weight="bold"
          >
            10
          </text>
        </svg>
      </button>

      <button
        class="control-btn volume-btn"
        (click)="toggleMute()"
        [title]="isMuted ? 'Unmute' : 'Mute'"
      >
        <svg
          *ngIf="!isMuted && volume > 0.5"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
          />
        </svg>
        <svg
          *ngIf="!isMuted && volume <= 0.5 && volume > 0"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M7 9v6h4l5 5V4l-5 5H7zm11.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
          />
        </svg>
        <svg
          *ngIf="isMuted || volume === 0"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
          />
        </svg>
      </button>

      <div class="volume-slider">
        <input
          type="range"
          min="0"
          max="100"
          [value]="volume * 100"
          (input)="setVolume($event)"
          class="slider"
        />
      </div>
    </div>
  </div>
</div>
