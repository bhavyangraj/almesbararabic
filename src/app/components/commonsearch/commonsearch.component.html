<div class="card-body d-flex justify-content-center">
  <div class="search-wrapper" [class.active]="isActive">
    <div class="input-holder" style="max-width: 750px">
      <input
        type="text"
        label="sourcesearch"
        placeholder="Search ..."
        [(ngModel)]="search"
        class="search-input"
        (blur)="get2()"
      />
      <button class="search-icon" (click)="isActive = true">
        <span></span>
      </button>
    </div>
    <button
      class="close"
      (click)="search = ''; results = []"
      style="left: 300x"
    ></button>
  </div>
</div>

<div
  
  style="width: 30%; position: absolute; top: 250px; left: 35%; z-index: 200"
  *ngIf="isLoading"
  class="absolute bg-white border border-gray-200 w-full mt-1 p-2 rounded-md text-gray-500 mobilesearch"
>
  Loading...
</div>

<ul
  style="
    width: 30%;
    position: absolute;
    top: 250px;
    left: 35%;
    z-index: 200;
    box-shadow: 0 1rem 3rem #003366;
  "
  *ngIf="!isLoading && results.length > 0"
  class="absolute bg-white border border-gray-200 w-full mt-1 rounded-md scrollable mobilesearch"
>
  <li
    *ngFor="let item of results"
    (click)="gotoDetailPage(item)"
    class="px-3 py-2 hover:bg-blue-100 cursor-pointer hover mb-3"
  >
    <div class="row">
      <div class="col-md-3">
        <img src="{{ item.frontimage || item.image }}" />
      </div>
      <div class="col-md-9 align-self-center">
        <h6 style="color: #253595">
          {{ item.title }}
        </h6>
      </div>
    </div>
  </li>
  <a
    routerLink="/results/{{ search }}"
    class="cursor"
    *ngIf="size > 4"
    (click)="search = ''; results = []"
    ><button class="btn btn-primary w-100 mb-3">عرض جميع النتائج</button>
  </a>
</ul>
