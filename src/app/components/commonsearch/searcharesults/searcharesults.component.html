<div class="container mt-3">
  <div class="row mb-3 header-sub sticky">
    <div class="col-md-5 align-self-center">
      <h1 class="breadcrumb-chevron">نتائج البحث</h1>
    </div>
  </div>

  <div class="row mt-5" *ngIf="results">
    <div class="col-md-12" *ngFor="let interview of results">
      <div class="card mb-5">
        <div class="card-body" style="position: relative">
          <div class="row">
            <div class="col-sm-4">
              <img
                (click)="openInNewTab(interview)"
                src="{{ interview.image || interview.frontimage }}"
                class="card-img-top cursor"
                alt="..."
                style="max-height: 400px"
                id="card-img"
              />
              <h2
                (click)="openInNewTab(interview)"
                class="card-title text-center cursor"
                style="font-size: 1.75rem; color: #2f3595"
              >
                {{ interview.title }}
              </h2>
            </div>
            <div class="col-sm-8">
              <div class="card scrollable" style="max-height: 400px">
                <div class="card-body">
                  <p
                    class="card-text truncate-5"
                    [class.hide-images]="hideImages"
                    [innerHtml]="
                      interview.description || interview.introduction
                    "
                    style="text-align: justify"
                  ></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="isLoading" class="loading">
      <div class="loader-spinner"></div>
      Loading more data...
    </div>
  </div>

  <div class="row" *ngIf="results.length === 0">No Data Available</div>
</div>
